blueprint:
  name: focs.cat fire alert
  description: >
    Send a notification (phone push, Telegram, etc.) whenever the focs.cat
    integration detects a new fire within your configured radius.
  domain: automation
  source_url: https://github.com/abate/ha-focs/blob/main/custom_components/focs/blueprints/automation/focs/focs_fire_alert.yaml
  input:
    notify_action:
      name: Notification action
      description: >
        What to do when a fire is detected. The default sends a notification —
        open it, pick your notify service (autocompletes, e.g.
        notify.mobile_app_my_phone or notify.telegram), and tweak the message
        if you like. You can reference the fire via `fire.*`
        (fire.status, fire.location, fire.distance_km, fire.ops,
        fire.description, fire.url, fire.media, ...).
      default:
        - service: notify.notify
          data:
            title: "🔥 {{ fire.status }} fire {{ fire.distance_km }} km away"
            message: >-
              {{ fire.type }} — {{ fire.location }}{% if fire.ops %} · {{ fire.ops }} resources{% endif %}
              {% if fire.description %}

              {{ fire.description }}{% endif %}

              {{ fire.url }}
            data:
              # mobile_app shows this as the notification image; ignored by
              # notifiers that don't support it.
              image: "{{ photos[0] if photos else none }}"
      selector:
        action: {}
    min_ops:
      name: Minimum resources (ops)
      description: >
        Only notify if at least this many resources are deployed. Set to 0 to
        be notified about every fire.
      default: 0
      selector:
        number:
          min: 0
          max: 200
          mode: box

mode: queued
max: 10

trigger:
  - platform: event
    event_type: focs_fire_detected

variables:
  min_ops: !input min_ops
  fire: "{{ trigger.event.data }}"
  ops: "{{ (trigger.event.data.ops | default(0)) | int(0) }}"
  photos: >-
    {{ (trigger.event.data.media or []) | select('search', '(?i)\.(jpg|jpeg|png)') | list }}

condition:
  - condition: template
    value_template: "{{ ops >= (min_ops | int(0)) }}"

action: !input notify_action
