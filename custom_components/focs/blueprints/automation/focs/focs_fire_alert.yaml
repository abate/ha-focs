blueprint:
  name: focs.cat fire alert
  description: >
    Send a notification (phone push, Telegram, etc.) whenever the focs.cat
    integration detects a new fire within your configured radius. Filter which
    fires notify you and customize the message.
  domain: automation
  source_url: https://github.com/abate/ha-focs/blob/main/custom_components/focs/blueprints/automation/focs/focs_fire_alert.yaml
  input:
    notify_action:
      name: Notification action
      description: >
        What to do when a matching fire is detected. The default sends a
        notification using the title/message below — open it and pick your
        notify service (autocompletes, e.g. notify.mobile_app_my_phone or
        notify.telegram).
      default:
        - service: notify.notify
          data:
            title: "{{ title }}"
            message: "{{ message }}"
            data:
              # mobile_app shows this as the notification image; ignored by
              # notifiers that don't support it.
              image: "{{ photos[0] if photos else none }}"
      selector:
        action: {}

    filters:
      name: Filters
      icon: mdi:filter
      collapsed: true
      input:
        min_ops:
          name: Minimum resources (ops)
          description: Only notify if at least this many resources are deployed.
          default: 0
          selector:
            number:
              min: 0
              max: 200
              mode: box
        max_distance_km:
          name: Maximum distance (km)
          description: >
            Only notify if the fire is within this distance. 0 = no limit (use
            the integration's configured radius).
          default: 0
          selector:
            number:
              min: 0
              max: 200
              step: 0.5
              mode: box
              unit_of_measurement: km
        statuses:
          name: Statuses
          description: Only notify for these statuses. Leave empty to allow any.
          default: []
          selector:
            select:
              multiple: true
              custom_value: true
              options:
                - Actiu
                - Controlat
                - Estabilitzat
                - Extingit
                - Falsa Alarma
        forest_only:
          name: Forest fires only
          description: Only notify for forest/vegetation fires.
          default: false
          selector:
            boolean:

    message:
      name: Message
      icon: mdi:message-text
      collapsed: true
      input:
        title_template:
          name: Title template
          description: Supports templates and the `fire.*` fields.
          default: "🔥 {{ fire.status }} fire {{ fire.distance_km }} km away"
          selector:
            text:
        message_template:
          name: Message template
          description: >
            Supports templates and the `fire.*` fields (fire.type, fire.location,
            fire.ops, fire.description, fire.url, fire.fire_trucks, ...).
          default: |-
            {{ fire.type }} — {{ fire.location }}{% if fire.ops %} · {{ fire.ops }} resources{% endif %}
            {% if fire.description %}

            {{ fire.description }}{% endif %}

            {{ fire.url }}
          selector:
            text:
              multiline: true

mode: queued
max: 10

trigger:
  - platform: event
    event_type: focs_fire_detected

variables:
  fire: "{{ trigger.event.data }}"
  ops: "{{ (trigger.event.data.ops | default(0)) | int(0) }}"
  photos: >-
    {{ (trigger.event.data.media or []) | select('search', '(?i)\.(jpg|jpeg|png)') | list }}
  min_ops: !input min_ops
  max_distance: !input max_distance_km
  statuses: !input statuses
  forest_only: !input forest_only
  title: !input title_template
  message: !input message_template

condition:
  - condition: template
    value_template: >-
      {{ ops >= (min_ops | int(0))
         and (max_distance | float(0) == 0
              or (fire.distance_km | float(9999)) <= (max_distance | float(0)))
         and (statuses | length == 0 or fire.status in statuses)
         and (not forest_only or fire.is_forest_fire) }}

action: !input notify_action
